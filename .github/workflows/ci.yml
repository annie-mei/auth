name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fmt:
    name: Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          toolchain="$(awk -F'"' '/^[[:space:]]*channel[[:space:]]*=/ { print $2 }' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal --component rustfmt

      - name: Format check
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          toolchain="$(awk -F'"' '/^[[:space:]]*channel[[:space:]]*=/ { print $2 }' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal --component clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: "true"
          prefix-key: "auth"
          shared-key: "cargo-clippy"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CARGO_TERM_COLOR: always

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: annie_mei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          toolchain="$(awk -F'"' '/^[[:space:]]*channel[[:space:]]*=/ { print $2 }' rust-toolchain.toml)"
          rustup toolchain install "$toolchain" --profile minimal

      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: "true"
          prefix-key: "auth"
          shared-key: "cargo-test"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/annie_mei_test
        run: cargo test
